{% extends "base.html" %}

{% block title %}Secure Access | Aster Capital{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <span class="eyebrow">Secure Access</span>
    <h1>Enter the console key</h1>
    <p>Authentication is required before opening the SQL inspection workspace.</p>

    {% if error %}
      <div class="alert-panel alert-panel-danger mt-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('key_check') }}" class="mt-4">
      <div class="form-group mb-4">
        <label for="access_key" class="form-label">Access key</label>
        <input type="password" name="access_key" id="access_key" class="form-control font-mono form-control-lg" placeholder="Enter credential" required>
      </div>
      <button type="submit" class="btn btn-primary btn-pill w-100">Authorize</button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('index') }}">Return to dashboard</a>
    </div>
  </div>
</section>
{% endblock %}
