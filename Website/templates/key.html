<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCESS PORTAL</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <style>
    body {
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: var(--panel-bg);
      border-radius: var(--radius);
      padding: 40px;
      width: 400px;
      border: 1px solid var(--panel-border);
    }
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .login-header h3 {
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .login-header p {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h3>SECURE ACCESS</h3>
      <p>AUTHENTICATION REQUIRED</p>
    </div>
    
    {% if error %}
      <div class="mb-4 font-mono text-down p-3" style="background:#1f1616; border:1px solid #4a1c1c; border-radius:4px; font-size:0.85rem">
        > ERROR: {{ error }}
      </div>
    {% endif %}

    <form method="post" action="{{ url_for('key_check') }}">
      <div class="form-group mb-4">
        <label for="key" class="form-label">ACCESS KEY</label>
        <input type="password" name="key" id="key" class="form-control font-mono" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 font-mono">AUTHORIZE</button>
    </form>
    <div class="mt-4 text-center">
      <a href="{{ url_for('index') }}" class="text-muted font-mono" style="font-size:0.75rem;">← RETURN TO DASHBOARD</a>
    </div>
  </div>
</body>
</html>
