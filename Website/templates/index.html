<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Analysis Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4">
  <a class="navbar-brand" href="#">Stock Analysis Portal</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="{{ url_for('key_check') }}">SQL Scheduler</a></li>
      <li class="nav-item"><a class="nav-link" href="https://app.powerbi.com/links/crFivbhXYo?ctid=6a98ca7f-fa62-430e-8b86-32afb61b30fa&pbi_source=linkShare" target="_blank">PowerBI</a></li>
    </ul>
  </div>
</nav>

<div class="container-fluid mt-4 px-4">
  <div class="row">
    <!-- Left Sidebar -->
    <div class="col-lg-3 col-xl-2 mb-4">
      <div class="card">
        <div class="card-header">
          <h5 class="card-title">Analysis Tools</h5>
        </div>
        <div class="card-body">
          <div class="d-grid gap-2">
            <button class="btn btn-outline-primary btn-sm text-start" onclick="runProgram('prediction','Actual vs Prediction')">ACTUAL VS PREDICTION</button>
            <button class="btn btn-outline-primary btn-sm text-start" onclick="runProgram('final','Final Analysis')">FINAL ANALYSIS</button>
            <button class="btn btn-outline-primary btn-sm text-start" onclick="runProgram('news','News Extractor')">NEWS EXTRACTOR</button>
            <button class="btn btn-outline-primary btn-sm text-start" onclick="runProgram('sentiment','Sentiment Analyzer')">SENTIMENT ANALYZER</button>
            <button class="btn btn-outline-primary btn-sm text-start" onclick="runProgram('stockdata','Stock Data Daily')">STOCK DATA DAILY</button>
          </div>

          <div id="progressContainer" class="mt-4" style="display:none;">
            <div class="progress" style="height: 6px; background-color: var(--panel-border);">
              <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%; background-color: var(--accent-color);"></div>
            </div>
            <small id="progressStatus" class="d-block mt-2 font-mono text-muted" style="font-size: 0.75rem;">0%</small>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h5 class="card-title">System Status</h5>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted font-mono" style="font-size:0.75rem;">DATABASE</span>
            <span class="text-up font-mono" style="font-size:0.75rem;">ONLINE</span>
          </div>
          <div class="d-flex justify-content-between">
            <span class="text-muted font-mono" style="font-size:0.75rem;">AS OF LOCAL</span>
            <span class="font-mono text-muted" style="font-size:0.75rem;">{{ my_date }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="col-lg-9 col-xl-10">
      <div class="mb-4">
        <form id="searchForm" class="d-flex gap-2" style="max-width: 600px;">
          <input id="searchInput" class="form-control" type="text" placeholder="ENTER COMPANY NAME OR TICKER..." list="companyList" autocomplete="off">
          <datalist id="companyList">
            {% for company in company_list %}
              <option value="{{ company | capitalize }}"></option>
            {% endfor %}
          </datalist>
          <button class="btn btn-primary px-4 font-mono" type="submit" style="font-size:0.85rem">ANALYZE</button>
        </form>
      </div>

      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="card-title">PREDICTION VS ACTUAL OVERVIEW</h5>
          <span class="text-muted font-mono" style="font-size: 0.75rem;">PREDICTION DATE: {{ prediction_date }}</span>
        </div>
        <div class="card-body p-0">
          <div id="mini-charts-grid" class="p-3 d-grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="text-center mt-5">
  <small>STOCK ANALYSIS SYSTEM v2.0 | ALL RIGHTS RESERVED © 2026</small>
</footer>

<script>
const miniChartsGrid = document.getElementById('mini-charts-grid');
const companiesToShow = ['RELIANCE.NS','TCS.NS','INFY.NS','BAJFINANCE.NS','ICICIBANK.NS','KOTAKBANK.NS','HCLTECH.NS','LT.NS','ITC.NS','SBIN.NS','BHARTIARTL.NS','ASIANPAINT.NS'];

fetch('/prediction-vs-actual')
  .then(res => res.json())
  .then(data => {
    const filteredData = data.filter(item => companiesToShow.includes(item.ticker.trim().toUpperCase()));
    if (!filteredData.length) { miniChartsGrid.innerHTML = "<p class='text-muted p-3 font-mono'>No metrics available.</p>"; return; }

    filteredData.forEach(item => {
      const wrapper = document.createElement('div');
      wrapper.classList.add('mini-chart-wrapper');
      
      const title = document.createElement('div');
      title.innerText = item.ticker;
      title.style.marginBottom = '8px';
      title.style.fontWeight = '600';
      wrapper.appendChild(title);

      const canvas = document.createElement('canvas');
      canvas.id = `chart-${item.ticker}`;
      canvas.style.height = '140px';
      canvas.style.width = '100%';
      wrapper.appendChild(canvas);

      miniChartsGrid.appendChild(wrapper);

      new Chart(canvas, {
        type: 'bar',
        data: {
          labels: ['PRD', 'ACT'],
          datasets: [{ 
            data: [item.predicted, item.actual], 
            backgroundColor: ['#3b82f6', '#10b981'],
            borderRadius: 2
          }]
        },
        options: { 
          responsive: false, 
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }, 
          scales: { 
            y: { ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#232a35' }, border: { display: false } },
            x: { ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } }, grid: { display: false }, border: { display: false } }
          } 
        }
      });
    });
  })
  .catch(err => { 
    miniChartsGrid.innerHTML = "<p class='text-muted p-3 font-mono'>Failed to fetch metrics.</p>"; 
  });

document.getElementById('searchForm').addEventListener('submit', function(e){
  e.preventDefault();
  let company = document.getElementById('searchInput').value.trim().toLowerCase();
  if(company) window.location.href = `/company/${company}`;
});

function runProgram(programId, displayName) {
  document.getElementById('progressContainer').style.display = 'block';
  const pb = document.getElementById('progressBar');
  const ps = document.getElementById('progressStatus');
  pb.style.width = '0%';
  ps.innerText = 'WAITING...';
  
  fetch('/run_program', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ program: programId })
  }).then(r => r.json()).then(data => {
    if(data.status === 'started') {
      let progress = 10;
      const interval = setInterval(() => {
        progress += 15;
        if(progress > 90) clearInterval(interval);
        pb.style.width = progress + '%';
        ps.innerText = 'EXECUTING ' + progress + '%';
      }, 500);
    }
  });
}
</script>
</body>
</html>
