name: Daily Stock Pipeline

on:
  schedule:
    - cron: '30 1 * * 1-5'  
  
  workflow_dispatch:

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load environment variables from .env
        run: |
          if [ -f .env ]; then
            cat .env >> $GITHUB_ENV
          else
            echo "No .env file found in root, skipping."
          fi

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Documents Folder
        run: mkdir -p ~/Documents

      - name: 1. Extract Latest News
        run: python "Stock Analysis/News_Extractor.py"

      - name: 2. Analyze Sentiment (FinBERT)
        run: python "Stock Analysis/Sentiment_Analyzer.py"

      - name: 3. Fetch Daily Stock Data
        run: python "Stock Analysis/Stock_Data_Daily.py"

      - name: 4. Run ML Predictions (Random Forest)
        run: python "Stock Analysis/Final_Analysis.py"

      - name: 5. Reconcile Actual vs Predicted
        run: python "Stock Analysis/Actual_vs_Prediction.py"

      - name: Upload Output Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-stock-reports
          path: |
            news_articles.xlsx
            sentiment_analysis.xlsx
            ~/Documents/Final_Analysis_*.xlsx