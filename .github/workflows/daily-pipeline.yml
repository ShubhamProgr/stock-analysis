name: Daily Stock Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'  
  workflow_dispatch: 

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Create Documents Folder
        run: mkdir -p ~/Documents

      - name: Fetch Daily Stock Data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python "Stock Analysis/Stock_Data_Daily.py"

      - name: Run ML Predictions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python "Stock Analysis/Final_Analysis.py"

      - name: Reconcile Actual vs Predicted
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python "Stock Analysis/Actual_vs_Prediction.py"